version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database changes across container restarts
      - ./retainiq.db:/app/retainiq.db
    environment:
      - ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Internal Docker network URL for Next.js Server-Side parameter fetching
      - INTERNAL_API_URL=http://backend:8000
      # External host URL for Client-Side Javascript interactions
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
